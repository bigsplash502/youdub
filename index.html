<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YOUDUB 2025 • AI Music Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  :root { --cyan:#0ff; --pink:#ff0066; --purple:#9e00ff; }
  body { margin:0; padding:15px; background:linear-gradient(135deg,#000022,#220044); color:var(--cyan); font-family:system-ui,sans-serif; text-align:center; }
  h1 { font-size:2.8em; text-shadow:0 0 20px #0ff; margin:10px 0; }
  .card { background:rgba(0,20,60,0.9); border:2px solid var(--cyan); border-radius:16px; padding:20px; margin:15px auto; max-width:960px; box-shadow:0 0 30px rgba(0,255,255,0.3); }
  button { padding:14px 28px; margin:8px; font-size:17px; cursor:pointer; background:linear-gradient(45deg,var(--pink),var(--purple)); color:white; border:none; border-radius:12px; }
  .big { padding:18px 50px; font-size:21px; background:linear-gradient(45deg,#00ff00,#00cc00); }
  .ad-btn { background:linear-gradient(45deg,#ffd700,#ffaa00); color:#000; font-weight:bold; }
  .status { padding:16px; background:#001122; border-radius:10px; font-size:18px; margin:10px 0; }
  canvas { width:100%; height:180px; background:#000; border:2px solid var(--cyan); border-radius:12px; margin:12px 0; }
  textarea { width:100%; background:#000; color:#0ff; border:1px solid #0ff; padding:12px; font-size:16px; border-radius:8px; min-height:200px; }
</style>
</head>
<body>
<h1>YOUDUB 2025</h1>
<p style="color:#ff00ff;">Beat • Record • Transcribe</p>

<div class="card">
  <strong>💎 Credits: <span id="creditDisplay">25</span></strong><br><br>
  <button onclick="watchAd()" class="ad-btn">🔥 WATCH AD → +15 Credits</button>
</div>

<div class="card">
  <h2>Load Beat</h2>
  <input type="file" id="file" accept="audio/*" style="display:none">
  <button onclick="document.getElementById('file').click()">📁 UPLOAD BEAT</button>
  <button onclick="playSample()" class="big">LOAD DEMO</button>
  <div class="status" id="status">Ready</div>
</div>

<div class="card">
  <h2>Waveform</h2>
  <canvas id="wave" width="800" height="180"></canvas>
</div>

<div class="card">
  <button onclick="play()" class="big">▶ PLAY BEAT + AUTO TRANSCRIBE</button>
  <button onclick="stop()">STOP</button>
</div>

<div class="card">
  <h2>Transcription</h2>
  <button onclick="manualStartTranscription()" class="big" style="background:#ff5500">🎤 MANUAL START</button>
  <button onclick="stopTranscription()">STOP</button>
  <textarea id="lyricsOutput" rows="10" placeholder="Lyrics will appear here..."></textarea>
</div>

<script>
// Credits
let credits = 25;
function updateCredits() { document.getElementById('creditDisplay').textContent = credits; }

// Audio
let ctx, buffer, source, gainNode;
let isPlaying = false;
let recognition = null;

async function initAudio() {
  if (!ctx) {
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    gainNode = ctx.createGain();
    gainNode.connect(ctx.destination);
  }
  await ctx.resume();
}

// File Upload
document.getElementById('file').onchange = async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('status').textContent = `Loading ${file.name}...`;
  try {
    const buf = await file.arrayBuffer();
    await loadAudio(buf);
  } catch(err) {
    document.getElementById('status').textContent = "❌ Failed to load file";
  }
};

async function loadAudio(arrayBuf) {
  await initAudio();
  buffer = await ctx.decodeAudioData(arrayBuf);
  document.getElementById('status').textContent = `✅ Loaded ${buffer.duration.toFixed(1)}s`;
}

async function playSample() {
  document.getElementById('status').textContent = "Loading demo...";
  try {
    // Using a more reliable CORS-friendly test audio
    const resp = await fetch('https://freesound.org/data/previews/612/612095_5674468-lq.mp3');
    await loadAudio(await resp.arrayBuffer());
  } catch(e) {
    document.getElementById('status').textContent = "Demo failed - please upload a file";
  }
}

// Play + Auto Transcription
async function play() {
  if (!buffer) return document.getElementById('status').textContent = "Load a beat first!";
  
  await initAudio();
  stop();

  source = ctx.createBufferSource();
  source.buffer = buffer;
  source.connect(gainNode);
  source.start();
  isPlaying = true;

  document.getElementById('status').textContent = "Playing + Transcribing...";

  // Auto start transcription
  startTranscription();
}

function stop() {
  if (source) source.stop();
  isPlaying = false;
  stopTranscription();
  document.getElementById('status').textContent = "Stopped";
}

// Transcription Functions
function startTranscription() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    document.getElementById('status').textContent = "❌ Transcription not supported in this browser";
    return;
  }

  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  let finalText = document.getElementById('lyricsOutput').value || "";

  recognition.onresult = (event) => {
    let interim = "";
    for (let i = event.resultIndex; i < event.results.length; i++) {
      if (event.results[i].isFinal) {
        finalText += event.results[i][0].transcript + " ";
      } else {
        interim = event.results[i][0].transcript;
      }
    }
    document.getElementById('lyricsOutput').value = finalText + interim;
  };

  recognition.onerror = (e) => {
    console.log("Speech error:", e.error);
    if (e.error === "aborted") document.getElementById('status').textContent = "Transcription stopped";
  };

  recognition.start();
}

function manualStartTranscription() {
  startTranscription();
}

function stopTranscription() {
  if (recognition) {
    recognition.stop();
    recognition = null;
  }
}

// Init
updateCredits();
playSample();
</script>
</body>
</html>
