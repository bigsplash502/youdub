<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YOUDUB 2025 • AI Music Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  :root { --cyan:#0ff; --pink:#ff0066; --purple:#9e00ff; --green:#0f0; }
  body { margin:0; padding:20px; min-height:100vh; background:linear-gradient(135deg,#000022,#220044); color:var(--cyan); font-family:system-ui,sans-serif; text-align:center; }
  h1 { font-size:2.8em; text-shadow:0 0 20px #0ff; margin:15px 0; }
  .card { background:rgba(0,20,60,0.9); border:2px solid var(--cyan); border-radius:16px; padding:20px; max-width:960px; margin:15px auto; box-shadow:0 0 30px rgba(0,255,255,0.3); }
  button { padding:14px 28px; margin:8px; font-size:17px; cursor:pointer; background:linear-gradient(45deg,var(--pink),var(--purple)); color:white; border:none; border-radius:12px; transition:.2s; }
  button:hover { transform:scale(1.05); }
  .big { padding:18px 50px; font-size:22px; background:linear-gradient(45deg,#00ff00,#00cc00); }
  .ad-btn { background:linear-gradient(45deg,#ffd700,#ffaa00); color:#000; font-weight:bold; }
  .status { padding:16px; background:#001122; border-radius:10px; font-size:18px; margin:10px 0; }
  canvas { width:100%; height:160px; background:#000; border:2px solid var(--cyan); border-radius:12px; margin:12px 0; }
  textarea { width:100%; background:#000; color:#0ff; border:1px solid #0ff; padding:12px; font-size:16.5px; border-radius:8px; }
  .credits { font-size:20px; font-weight:bold; color:#ffd700; margin:8px 0; }
</style>
</head>
<body>
<h1>YOUDUB 2025</h1>
<p style="color:#ff00ff; font-size:1.4em;">Create • Record • Transcribe</p>

<div class="card">
  <div class="credits">💎 Credits: <span id="creditDisplay">25</span></div>
  <button onclick="watchAd()" class="ad-btn">🔥 WATCH AD → +15 Credits</button>
</div>

<div class="card">
  <h2>Load Beat</h2>
  <input type="file" id="file" accept="audio/*" style="display:none">
  <button onclick="document.getElementById('file').click()">UPLOAD BEAT</button>
  <button onclick="playSample()" class="big">LOAD DEMO BEAT</button>
  <div class="status" id="status">Ready</div>
</div>

<div class="card">
  <h2>Waveform + Loop</h2>
  <canvas id="wave" width="800" height="160"></canvas>
  <label>Start: <input type="number" id="loopStart" step="0.01" value="0"></label>
  <label>End: <input type="number" id="loopEnd" step="0.01" value="30"></label>
  <button id="loopBtn" onclick="toggleLoop()">LOOP: OFF</button>
</div>

<div class="card">
  <button onclick="play()" class="big">▶ PLAY BEAT</button>
  <button onclick="pause()">PAUSE</button>
  <button onclick="stop()">STOP</button>
  <button id="recBtn" onclick="toggleRecord()" class="big">🎤 RECORD TAKE (-5)</button>
  <button id="stopRecBtn" onclick="stopRecord()" style="display:none;background:#aa0000">STOP RECORDING</button>
</div>

<div class="card">
  <h2>Live Transcription</h2>
  <button onclick="startFastRapMode()" class="big" style="background:#ff5500">⚡ FAST RAP MODE (-3)</button>
  <button onclick="stopLyricsCapture()">STOP</button>

  <textarea id="lyricsOutput" rows="11" placeholder="Your lyrics appear here..."></textarea>

  <div style="margin:12px 0;">
    <button onclick="addStructure('Hook')">+ Hook</button>
    <button onclick="addStructure('Verse 1')">+ Verse 1</button>
    <button onclick="addStructure('Verse 2')">+ Verse 2</button>
    <button onclick="addStructure('Bridge')">+ Bridge</button>
  </div>

  <button onclick="exportLyrics()">Export Lyrics</button>
</div>

<script>
// ====================== CREDIT SYSTEM ======================
let credits = 25;           // Starting credits
const COST_RECORD = 5;
const COST_TRANSCRIBE = 3;

function updateCredits() {
  document.getElementById('creditDisplay').textContent = credits;
}

function spendCredits(amount, action) {
  if (credits < amount) {
    alert(`Not enough credits! Watch an ad to get more.`);
    return false;
  }
  credits -= amount;
  updateCredits();
  return true;
}

function watchAd() {
  // Simulated Ad (In real app this calls AdMob Rewarded Video)
  const watching = confirm("🎥 Watching a short ad...\n\n(Click OK when ad finishes)");
  if (watching) {
    credits += 15;
    updateCredits();
    alert("✅ +15 Credits Added!");
  }
}

// ====================== AUDIO CORE ======================
let ctx, buffer, source, gainNode;
let isPlaying = false, isLooping = false;
let loopStart = 0, loopEnd = 30, duration = 0;
let recognition = null;
let finalTranscript = "";

async function initAudio() {
  if (!ctx) {
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    gainNode = ctx.createGain();
    gainNode.connect(ctx.destination);
  }
  await ctx.resume();
}

async function playSample() {
  status('Loading demo...');
  try {
    const resp = await fetch('https://www.learningcontainer.com/wp-content/uploads/2020/02/Kalimba.mp3');
    await loadAudio(await resp.arrayBuffer());
  } catch(e) { status('Demo failed'); }
}

async function loadAudio(arrayBuf) {
  await initAudio();
  buffer = await ctx.decodeAudioData(arrayBuf);
  duration = buffer.duration;
  loopEnd = Math.min(30, duration);
  document.getElementById('loopEnd').value = loopEnd.toFixed(2);
  drawWaveform();
  status(`Loaded ${duration.toFixed(1)}s`);
}

// Waveform, Play, Loop, etc. (kept simple)
function drawWaveform() {
  const canvas = document.getElementById('wave');
  const c = canvas.getContext('2d');
  c.fillStyle = '#000'; c.fillRect(0,0,canvas.width,canvas.height);
  if (!buffer) return;
  const data = buffer.getChannelData(0);
  const step = Math.ceil(data.length / canvas.width);
  c.strokeStyle = '#0f0'; c.lineWidth = 2; c.beginPath();
  for (let i = 0; i < canvas.width; i++) {
    let sum = 0;
    for (let j = 0; j < step; j++) sum += Math.abs(data[i*step + j] || 0);
    const y = canvas.height/2 * (1 - sum/step * 1.6);
    i===0 ? c.moveTo(i,y) : c.lineTo(i,y);
  }
  c.stroke();
}

async function play() {
  if (!buffer) return status("Load beat first");
  await initAudio(); stop();
  source = ctx.createBufferSource();
  source.buffer = buffer;
  if (isLooping && loopEnd > loopStart) {
    source.loop = true; source.loopStart = loopStart; source.loopEnd = loopEnd;
  }
  source.connect(gainNode);
  source.start(0, isLooping ? loopStart : 0);
  isPlaying = true;
  status(isLooping ? 'LOOPING' : 'Playing');
}
function stop() { if (source) source.stop(); isPlaying = false; status('Stopped'); }
function pause() { stop(); }
function toggleLoop() {
  isLooping = !isLooping;
  document.getElementById('loopBtn').textContent = isLooping ? 'LOOP: ON' : 'LOOP: OFF';
}

// ====================== RECORDING ======================
async function toggleRecord() {
  if (!spendCredits(COST_RECORD, "Recording")) return;
  alert("Recording started (simulated). Stop to save take.");
  // Add real recording logic here later
}

// ====================== TRANSCRIPTION ======================
function startFastRapMode() {
  if (!spendCredits(COST_TRANSCRIBE, "Transcription")) return;

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return alert("Use Chrome");

  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';
  recognition.maxAlternatives = 5;

  finalTranscript = document.getElementById('lyricsOutput').value || "";

  recognition.onresult = (event) => {
    let interim = "";
    for (let i = event.resultIndex; i < event.results.length; i++) {
      if (event.results[i].isFinal) {
        finalTranscript += event.results[i][0].transcript + " ";
      } else {
        interim = event.results[i][0].transcript;
      }
    }
    document.getElementById('lyricsOutput').value = finalTranscript + interim;
    document.getElementById('lyricsOutput').scrollTop = 999999;
  };

  recognition.start();
  status('⚡ FAST RAP MODE - Credits used');
}

function stopLyricsCapture() {
  if (recognition) recognition.stop();
  status('Transcription stopped');
}

function addStructure(label) {
  const ta = document.getElementById('lyricsOutput');
  ta.value += `\n\n[${label}]\n`;
  ta.scrollTop = ta.scrollHeight;
}

function exportLyrics() {
  const text = document.getElementById('lyricsOutput').value;
  if (!text) return alert("No lyrics");
  const blob = new Blob([text], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'youdub_lyrics.txt';
  a.click();
}

function status(msg) { document.getElementById('status').textContent = msg; }

// Init
updateCredits();
playSample();
</script>
</body>
</html>
