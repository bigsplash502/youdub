<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YOUDUB 2025</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  body { margin:0; padding:15px; background:linear-gradient(135deg,#000022,#220044); color:#0ff; font-family:system-ui,sans-serif; text-align:center; }
  h1 { font-size:2.8em; text-shadow:0 0 20px #0ff; margin:10px 0; }
  .card { background:rgba(0,20,60,0.9); border:2px solid #0ff; border-radius:16px; padding:20px; margin:15px auto; max-width:960px; }
  button { padding:14px 28px; margin:8px; font-size:17px; cursor:pointer; background:linear-gradient(45deg,#ff0066,#9e00ff); color:white; border:none; border-radius:12px; }
  .big { padding:18px 50px; font-size:22px; background:linear-gradient(#0f0,#0a0); }
  .status { padding:16px; background:#001122; border-radius:10px; font-size:18px; margin:10px 0; }
  canvas { width:100%; height:200px; background:#000; border:2px solid #0ff; border-radius:12px; margin:12px 0; }
  textarea { width:100%; height:280px; background:#000; color:#0ff; border:1px solid #0ff; padding:12px; font-size:16px; text-align:left; }
</style>
</head>
<body>
<h1>YOUDUB 2025</h1>

<div class="card">
  <h2>Load Beat</h2>
  <input type="file" id="file" accept="audio/*" style="display:none">
  <button onclick="document.getElementById('file').click()">📁 UPLOAD BEAT</button>
  <button onclick="playSample()" class="big">LOAD DEMO</button>
  <div class="status" id="status">Ready</div>
</div>

<div class="card">
  <h2>Waveform</h2>
  <canvas id="wave" width="800" height="200"></canvas>
</div>

<div class="card">
  <button onclick="play()" class="big">▶ PLAY + AUTO TRANSCRIBE</button>
  <button onclick="stop()">STOP</button>
</div>

<div class="card">
  <h2>Live Timestamped Transcription</h2>
  <button onclick="manualStart()" style="background:#ff5500">🎤 MANUAL START</button>
  <button onclick="stopTranscription()">STOP</button>
  <textarea id="lyricsOutput" readonly placeholder="Timed lyrics will appear here..."></textarea>
</div>

<script>
let ctx, buffer, source, gainNode;
let isPlaying = false;
let animationFrame = null;
let recognition = null;
let startTime = 0;
let lyricsLog = [];

// File Upload + Load
document.getElementById('file').onchange = async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('status').textContent = `Loading ${file.name}...`;
  try {
    const buf = await file.arrayBuffer();
    await loadAudio(buf);
  } catch(err) {
    document.getElementById('status').textContent = "Failed to load";
  }
};

async function loadAudio(arrayBuf) {
  await initAudio();
  buffer = await ctx.decodeAudioData(arrayBuf);
  document.getElementById('status').textContent = `Loaded ${buffer.duration.toFixed(1)}s`;
  drawWaveform();
}

async function initAudio() {
  if (!ctx) {
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    gainNode = ctx.createGain();
    gainNode.connect(ctx.destination);
  }
  await ctx.resume();
}

async function playSample() {
  document.getElementById('status').textContent = "Loading demo...";
  try {
    const resp = await fetch('https://freesound.org/data/previews/612/612095_5674468-lq.mp3');
    await loadAudio(await resp.arrayBuffer());
  } catch(e) {
    document.getElementById('status').textContent = "Demo failed";
  }
}

// Waveform + Playhead
function drawWaveform(current = 0) {
  const canvas = document.getElementById('wave');
  const c = canvas.getContext('2d');
  c.fillStyle = '#000'; c.fillRect(0,0,canvas.width,canvas.height);
  if (!buffer) return;

  const data = buffer.getChannelData(0);
  const step = Math.ceil(data.length / canvas.width);
  c.strokeStyle = '#0f0'; c.lineWidth = 2; c.beginPath();
  for (let i = 0; i < canvas.width; i++) {
    let sum = 0;
    for (let j = 0; j < step; j++) sum += Math.abs(data[i*step + j] || 0);
    const y = canvas.height/2 * (1 - sum/step * 1.8);
    i===0 ? c.moveTo(i,y) : c.lineTo(i,y);
  }
  c.stroke();

  if (isPlaying) {
    const x = (current / buffer.duration) * canvas.width;
    c.strokeStyle = '#00ffff'; c.lineWidth = 4;
    c.beginPath(); c.moveTo(x, 0); c.lineTo(x, canvas.height); c.stroke();
  }
}

// Play
async function play() {
  if (!buffer) return document.getElementById('status').textContent = "Load a beat first";
  await initAudio(); stop();

  source = ctx.createBufferSource();
  source.buffer = buffer;
  source.connect(gainNode);
  source.start();
  isPlaying = true;
  startTime = ctx.currentTime;

  function update() {
    if (!isPlaying) return;
    drawWaveform(ctx.currentTime - startTime);
    animationFrame = requestAnimationFrame(update);
  }
  update();

  startTranscription();
  document.getElementById('status').textContent = "Playing + Transcribing...";
}

function stop() {
  if (source) source.stop();
  isPlaying = false;
  cancelAnimationFrame(animationFrame);
  stopTranscription();
  drawWaveform(0);
  document.getElementById('status').textContent = "Stopped";
}

// ====================== TRANSCRIPTION WITH TIMESTAMPS ======================
function startTranscription() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;

  recognition = new SR();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  recognition.onresult = (event) => {
    let interim = "";
    for (let i = event.resultIndex; i < event.results.length; i++) {
      if (event.results[i].isFinal) {
        const time = (ctx.currentTime - startTime).toFixed(1);
        const line = `[${time}s] ${event.results[i][0].transcript}`;
        lyricsLog.push(line);
        document.getElementById('lyricsOutput').value = lyricsLog.join('\n');
      } else {
        interim = event.results[i][0].transcript;
      }
    }
  };

  recognition.start();
}

function manualStart() {
  startTranscription();
}

function stopTranscription() {
  if (recognition) recognition.stop();
}

// Init
playSample();
</script>
</body>
</html>
