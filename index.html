<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YOUDUB 2025 • AI Music Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  :root { --cyan:#0ff; --pink:#ff0066; --purple:#9e00ff; --green:#0f0; }
  body { margin:0; padding:15px; min-height:100vh; background:linear-gradient(135deg,#000022,#220044); color:var(--cyan); font-family:system-ui,sans-serif; text-align:center; }
  h1 { font-size:2.7em; text-shadow:0 0 20px #0ff; margin:10px 0; }
  .card { background:rgba(0,20,60,0.9); border:2px solid var(--cyan); border-radius:16px; padding:20px; margin:15px auto; max-width:960px; box-shadow:0 0 30px rgba(0,255,255,0.3); }
  button { padding:14px 28px; margin:8px; font-size:17px; cursor:pointer; background:linear-gradient(45deg,var(--pink),var(--purple)); color:white; border:none; border-radius:12px; }
  .big { padding:18px 50px; font-size:21px; background:linear-gradient(45deg,#00ff00,#00cc00); }
  .ad-btn { background:linear-gradient(45deg,#ffd700,#ffaa00); color:#000; font-weight:bold; }
  .status { padding:16px; background:#001122; border-radius:10px; font-size:18px; margin:10px 0; }
  canvas { width:100%; height:160px; background:#000; border:2px solid var(--cyan); border-radius:12px; margin:12px 0; }
  textarea { width:100%; background:#000; color:#0ff; border:1px solid #0ff; padding:12px; font-size:16px; border-radius:8px; min-height:180px; }
  .credits { font-size:21px; font-weight:bold; color:#ffd700; }
</style>
</head>
<body>
<h1>YOUDUB 2025</h1>
<p style="color:#ff00ff;">Create • Record • Transcribe</p>

<div class="card">
  <div class="credits">💎 Credits: <span id="creditDisplay">25</span></div>
  <button onclick="watchAd()" class="ad-btn">🔥 WATCH AD → +15 Credits</button>
</div>

<div class="card">
  <h2>Load Beat</h2>
  <input type="file" id="file" accept="audio/*" style="display:none">
  <button onclick="document.getElementById('file').click()">📁 UPLOAD BEAT</button>
  <button onclick="playSample()" class="big">LOAD DEMO BEAT</button>
  <div class="status" id="status">Ready</div>
</div>

<div class="card">
  <h2>Live Transcription</h2>
  <button onclick="startFastRapMode()" class="big" style="background:#ff5500">⚡ FAST RAP MODE (-3)</button>
  <button onclick="stopLyricsCapture()">STOP</button>
  <textarea id="lyricsOutput" rows="11" placeholder="Your lyrics appear here..."></textarea>
</div>

<script>
// Credit System
let credits = 25;
function updateCredits() { document.getElementById('creditDisplay').textContent = credits; }

function spendCredits(amount) {
  if (credits < amount) {
    alert("Not enough credits! Watch an ad.");
    return false;
  }
  credits -= amount;
  updateCredits();
  return true;
}

function watchAd() {
  if (confirm("Watch short ad for +15 credits?")) {
    credits += 15;
    updateCredits();
    alert("✅ +15 Credits Added!");
  }
}

// File Upload Fix
document.getElementById('file').onchange = async function(e) {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('status').textContent = `Loading ${file.name}...`;
  try {
    const arrayBuf = await file.arrayBuffer();
    await loadAudio(arrayBuf);
  } catch(err) {
    document.getElementById('status').textContent = "❌ Failed to load file";
  }
};

let ctx, buffer;
async function initAudio() {
  if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
  await ctx.resume();
}

async function loadAudio(arrayBuf) {
  await initAudio();
  buffer = await ctx.decodeAudioData(arrayBuf);
  document.getElementById('status').textContent = `✅ Loaded ${buffer.duration.toFixed(1)}s beat`;
}

async function playSample() {
  document.getElementById('status').textContent = "Loading demo...";
  try {
    const resp = await fetch('https://www.learningcontainer.com/wp-content/uploads/2020/02/Kalimba.mp3');
    await loadAudio(await resp.arrayBuffer());
  } catch(e) {
    document.getElementById('status').textContent = "Demo failed";
  }
}

// Transcription
let recognition = null;
function startFastRapMode() {
  if (!spendCredits(3)) return;
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return alert("Use Chrome browser");

  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  let finalText = document.getElementById('lyricsOutput').value || "";

  recognition.onresult = (event) => {
    let interim = "";
    for (let i = event.resultIndex; i < event.results.length; i++) {
      if (event.results[i].isFinal) finalText += event.results[i][0].transcript + " ";
      else interim = event.results[i][0].transcript;
    }
    document.getElementById('lyricsOutput').value = finalText + interim;
  };

  recognition.start();
  document.getElementById('status').textContent = "🎤 Listening...";
}

function stopLyricsCapture() {
  if (recognition) recognition.stop();
  document.getElementById('status').textContent = "Stopped";
}

// Init
updateCredits();
playSample();
</script>
</body>
</html>
