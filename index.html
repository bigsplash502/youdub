<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YOUDUB 2025 - Test</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { margin:0; padding:20px; background:#000022; color:#0ff; font-family:Arial; text-align:center; }
  .card { background:rgba(0,30,80,0.9); border:2px solid #0ff; border-radius:15px; padding:20px; margin:20px auto; max-width:800px; }
  button { padding:15px 30px; font-size:20px; margin:10px; background:#ff0066; color:white; border:none; border-radius:10px; }
  textarea { width:100%; height:300px; background:#000; color:#0ff; padding:15px; font-size:17px; }
  .status { padding:15px; background:#001122; border-radius:10px; font-size:18px; margin:15px 0; }
</style>
</head>
<body>
<h1>YOUDUB 2025 - SIMPLE TEST</h1>

<div class="card">
  <h2>1. Load Beat</h2>
  <input type="file" id="file" accept="audio/*" style="display:none">
  <button onclick="document.getElementById('file').click()">UPLOAD BEAT</button>
  <button onclick="playSample()">LOAD DEMO</button>
  <div class="status" id="status">Ready</div>
</div>

<div class="card">
  <h2>2. Play + Transcribe</h2>
  <button onclick="play()" style="background:#00cc00">▶ PLAY + START TRANSCRIPTION</button>
  <button onclick="stopAll()">STOP ALL</button>
</div>

<div class="card">
  <h2>Live Transcription</h2>
  <textarea id="lyricsOutput" placeholder="Your lyrics will appear here..."></textarea>
</div>

<script>
let ctx, buffer, source;
let isPlaying = false;
let recognition = null;

// File Upload
document.getElementById('file').onchange = async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('status').textContent = `Loading ${file.name}...`;
  try {
    const buf = await file.arrayBuffer();
    await loadAudio(buf);
  } catch(err) {
    document.getElementById('status').textContent = "Failed to load file";
  }
};

async function loadAudio(arrayBuf) {
  ctx = new (window.AudioContext || window.webkitAudioContext)();
  buffer = await ctx.decodeAudioData(arrayBuf);
  document.getElementById('status').textContent = `Loaded ${buffer.duration.toFixed(1)}s`;
}

async function playSample() {
  document.getElementById('status').textContent = "Loading demo...";
  try {
    const resp = await fetch('https://freesound.org/data/previews/612/612095_5674468-lq.mp3');
    const buf = await resp.arrayBuffer();
    await loadAudio(buf);
  } catch(e) {
    document.getElementById('status').textContent = "Demo failed - upload manually";
  }
}

async function play() {
  if (!buffer) {
    document.getElementById('status').textContent = "Please upload a beat first";
    return;
  }

  stopAll();

  source = ctx.createBufferSource();
  source.buffer = buffer;
  source.connect(ctx.destination);
  source.start();
  isPlaying = true;

  document.getElementById('status').textContent = "Playing... Transcription started";

  // Start Transcription
  startTranscription();
}

function stopAll() {
  if (source) source.stop();
  isPlaying = false;
  if (recognition) recognition.stop();
  document.getElementById('status').textContent = "Stopped";
}

// Transcription
function startTranscription() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    document.getElementById('status').textContent = "Transcription not supported in this browser";
    return;
  }

  recognition = new SR();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  recognition.onresult = (e) => {
    let text = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      text += e.results[i][0].transcript + ' ';
    }
    document.getElementById('lyricsOutput').value = text;
  };

  recognition.onerror = (e) => console.log("Speech error:", e.error);
  recognition.start();
}

playSample();
</script>
</body>
</html>
