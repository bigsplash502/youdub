<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YOUDUB 2025 • AI Music Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  :root { --cyan:#0ff; --pink:#ff0066; --purple:#9e00ff; }
  body { margin:0; padding:15px; background:linear-gradient(135deg,#000022,#220044); color:var(--cyan); font-family:system-ui,sans-serif; text-align:center; }
  h1 { font-size:2.8em; text-shadow:0 0 20px #0ff; margin:10px 0; }
  .card { background:rgba(0,20,60,0.9); border:2px solid var(--cyan); border-radius:16px; padding:20px; margin:15px auto; max-width:960px; box-shadow:0 0 30px rgba(0,255,255,0.3); }
  button { padding:14px 28px; margin:8px; font-size:17px; cursor:pointer; background:linear-gradient(45deg,var(--pink),var(--purple)); color:white; border:none; border-radius:12px; }
  .big { padding:18px 50px; font-size:21px; background:linear-gradient(45deg,#00ff00,#00cc00); }
  .ad-btn { background:linear-gradient(45deg,#ffd700,#ffaa00); color:#000; font-weight:bold; }
  .status { padding:16px; background:#001122; border-radius:10px; font-size:18px; margin:10px 0; }
  canvas { width:100%; height:180px; background:#000; border:2px solid var(--cyan); border-radius:12px; margin:12px 0; }
  textarea { width:100%; background:#000; color:#0ff; border:1px solid #0ff; padding:12px; font-size:16px; border-radius:8px; min-height:200px; }
</style>
</head>
<body>
<h1>YOUDUB 2025</h1>
<p style="color:#ff00ff;">Beat + Auto Transcription</p>

<div class="card">
  <strong>💎 Credits: <span id="creditDisplay">25</span></strong><br><br>
  <button onclick="watchAd()" class="ad-btn">🔥 WATCH AD → +15 Credits</button>
</div>

<div class="card">
  <h2>Load Beat</h2>
  <input type="file" id="file" accept="audio/*" style="display:none">
  <button onclick="document.getElementById('file').click()">📁 UPLOAD BEAT</button>
  <button onclick="playSample()" class="big">LOAD DEMO</button>
  <div class="status" id="status">Ready</div>
</div>

<div class="card">
  <h2>Waveform + Loop</h2>
  <canvas id="wave" width="800" height="180"></canvas>
  <div>
    Start: <input type="number" id="loopStart" step="0.01" value="0">s &nbsp;
    End: <input type="number" id="loopEnd" step="0.01" value="30">s
  </div>
  <button id="loopBtn" onclick="toggleLoop()">LOOP: OFF</button>
</div>

<div class="card">
  <button onclick="play()" class="big">▶ PLAY BEAT + AUTO TRANSCRIBE</button>
  <button onclick="pause()">PAUSE</button>
  <button onclick="stop()">STOP</button>
</div>

<div class="card">
  <h2>Transcription</h2>
  <button onclick="manualStartTranscription()" style="background:#ff5500">🎤 MANUAL TRANSCRIPTION</button>
  <button onclick="stopTranscription()">STOP TRANSCRIPTION</button>
  <textarea id="lyricsOutput" rows="11" placeholder="Lyrics will appear here automatically when you play..."></textarea>
</div>

<script>
// ====================== CREDITS ======================
let credits = 25;
function updateCredits() { document.getElementById('creditDisplay').textContent = credits; }

// ====================== AUDIO ======================
let ctx, buffer, source, gainNode;
let isPlaying = false, isLooping = false;
let loopStart = 0, loopEnd = 30, duration = 0;
let animationFrame = null;
let recognition = null;

async function initAudio() {
  if (!ctx) {
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    gainNode = ctx.createGain();
    gainNode.connect(ctx.destination);
  }
  await ctx.resume();
}

// File Upload
document.getElementById('file').onchange = async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('status').textContent = `Loading ${file.name}...`;
  try {
    const buf = await file.arrayBuffer();
    await loadAudio(buf);
  } catch(err) {
    document.getElementById('status').textContent = "❌ Failed to load file";
  }
};

async function loadAudio(arrayBuf) {
  await initAudio();
  buffer = await ctx.decodeAudioData(arrayBuf);
  duration = buffer.duration;
  loopEnd = Math.min(30, duration);
  document.getElementById('loopEnd').value = loopEnd.toFixed(2);
  drawWaveform();
  document.getElementById('status').textContent = `✅ Loaded ${duration.toFixed(1)}s beat`;
}

async function playSample() {
  document.getElementById('status').textContent = "Loading demo...";
  try {
    const resp = await fetch('https://www.learningcontainer.com/wp-content/uploads/2020/02/Kalimba.mp3');
    await loadAudio(await resp.arrayBuffer());
  } catch(e) { document.getElementById('status').textContent = "Demo failed"; }
}

// Waveform + Playhead
function drawWaveform(current = 0) {
  const canvas = document.getElementById('wave');
  const c = canvas.getContext('2d');
  c.fillStyle = '#000'; c.fillRect(0,0,canvas.width,canvas.height);
  if (!buffer) return;

  const data = buffer.getChannelData(0);
  const step = Math.ceil(data.length / canvas.width);
  c.strokeStyle = '#0f0'; c.lineWidth = 2; c.beginPath();
  for (let i = 0; i < canvas.width; i++) {
    let sum = 0;
    for (let j = 0; j < step; j++) sum += Math.abs(data[i*step + j] || 0);
    const y = canvas.height/2 * (1 - sum/step * 1.6);
    i===0 ? c.moveTo(i,y) : c.lineTo(i,y);
  }
  c.stroke();

  // Playhead
  if (isPlaying && duration) {
    const x = (current / duration) * canvas.width;
    c.strokeStyle = '#00ffff'; c.lineWidth = 3;
    c.beginPath(); c.moveTo(x, 0); c.lineTo(x, canvas.height); c.stroke();
  }
}

// Play + Auto Transcription
async function play() {
  if (!buffer) return document.getElementById('status').textContent = "Load a beat first";
  await initAudio(); stop();

  source = ctx.createBufferSource();
  source.buffer = buffer;
  if (isLooping && loopEnd > loopStart) {
    source.loop = true;
    source.loopStart = loopStart;
    source.loopEnd = loopEnd;
  }
  source.connect(gainNode);
  source.start(0, isLooping ? loopStart : 0);
  isPlaying = true;

  const startTime = ctx.currentTime;

  function update() {
    if (!isPlaying) return;
    const elapsed = ctx.currentTime - startTime;
    const current = isLooping ? (elapsed % (loopEnd - loopStart)) + loopStart : elapsed;
    drawWaveform(current);
    animationFrame = requestAnimationFrame(update);
  }
  update();

  // Auto start transcription when playing
  startTranscription();

  document.getElementById('status').textContent = isLooping ? 'LOOPING + TRANSCRIBING' : 'Playing + Transcribing';
}

function stop() {
  if (source) source.stop();
  isPlaying = false;
  cancelAnimationFrame(animationFrame);
  stopTranscription();
  drawWaveform(0);
  document.getElementById('status').textContent = 'Stopped';
}

function pause() { stop(); }

function toggleLoop() {
  isLooping = !isLooping;
  document.getElementById('loopBtn').textContent = isLooping ? 'LOOP: ON' : 'LOOP: OFF';
}

// ====================== TRANSCRIPTION ======================
function startTranscription() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    document.getElementById('status').textContent = "Transcription not supported in this browser";
    return;
  }

  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  let finalText = document.getElementById('lyricsOutput').value || "";

  recognition.onresult = (event) => {
    let interim = "";
    for (let i = event.resultIndex; i < event.results.length; i++) {
      if (event.results[i].isFinal) {
        finalText += event.results[i][0].transcript + " ";
      } else {
        interim = event.results[i][0].transcript;
      }
    }
    document.getElementById('lyricsOutput').value = finalText + interim;
    document.getElementById('lyricsOutput').scrollTop = 999999;
  };

  recognition.onerror = (e) => console.log("Speech error:", e.error);
  recognition.start();
}

function manualStartTranscription() {
  startTranscription();
}

function stopTranscription() {
  if (recognition) {
    recognition.stop();
    recognition = null;
  }
}

// Init
updateCredits();
playSample();
</script>
</body>
</html>
