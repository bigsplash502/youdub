<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Transcription Test</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { font-family: Arial; background: #000022; color: #0ff; text-align: center; padding: 40px; }
  button { padding: 20px 40px; font-size: 24px; margin: 20px; background: #ff0066; color: white; border: none; border-radius: 12px; }
  textarea { width: 90%; height: 400px; background: #000; color: #0ff; padding: 15px; font-size: 18px; margin-top: 20px; }
  .status { font-size: 22px; margin: 20px; padding: 20px; background: #001122; border-radius: 12px; }
</style>
</head>
<body>
  <h1>Transcription Test</h1>
  
  <button onclick="startTranscription()">🎤 START TRANSCRIPTION</button>
  <button onclick="stopTranscription()">STOP</button>
  
  <div class="status" id="status">Click START and allow microphone</div>
  <textarea id="output" placeholder="Your words will appear here..."></textarea>

<script>
let recognition = null;

function startTranscription() {
  const status = document.getElementById('status');
  
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  
  if (!SpeechRecognition) {
    status.textContent = "❌ Your browser doesn't support transcription. Use Chrome.";
    return;
  }

  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  recognition.onresult = (event) => {
    let text = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      text += event.results[i][0].transcript + ' ';
    }
    document.getElementById('output').value = text;
  };

  recognition.onerror = (e) => {
    status.textContent = "Error: " + e.error;
    console.error(e);
  };

  recognition.onend = () => {
    status.textContent = "Transcription stopped. Click START again.";
  };

  try {
    recognition.start();
    status.textContent = "🎤 LISTENING... Speak or rap now";
  } catch(err) {
    status.textContent = "Failed to start. Error: " + err.message;
  }
}

function stopTranscription() {
  if (recognition) recognition.stop();
  document.getElementById('status').textContent = "Stopped";
}
</script>
</body>
</html>
